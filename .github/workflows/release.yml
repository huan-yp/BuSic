# BuSic Release CI — 在推送 v* tag 时构建全平台 release 并发布到 GitHub Releases
#
# 使用方法:
#   1. 更新 pubspec.yaml 中的 version 字段 (如 0.2.0+2)
#   2. git add . && git commit -m "release: v0.2.0"
#   3. git tag v0.2.0
#   4. git push origin main --tags
#   → 自动触发此工作流, 构建全部平台并创建 GitHub Release

name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

# 确保同时只有一个 release 在跑
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # 创建 Release 需要写权限

env:
  FLUTTER_VERSION: '3.29.1'

jobs:
  # ───────────────────── 前置检查: CI 成功 + tag 触发 ──────────────────
  check:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    outputs:
      tag: ${{ github.event.workflow_run.head_branch }}
    steps:
      - run: echo "CI passed for tag ${{ github.event.workflow_run.head_branch }}"

  # ─────────────────────────────── Linux ───────────────────────────────
  build-linux:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check.outputs.tag }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies & generate code
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux
        run: |
          cd build/linux/x64/release/bundle
          tar czf ${{ github.workspace }}/busic-linux-x64.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: busic-linux-x64.tar.gz

  # ─────────────────────────────── Windows ─────────────────────────────
  build-windows:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check.outputs.tag }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies & generate code
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* `
            -DestinationPath busic-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: busic-windows-x64.zip

  # ─────────────────────────────── macOS ───────────────────────────────
  build-macos:
    needs: check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check.outputs.tag }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies & generate code
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS
        run: flutter build macos --release

      - name: Package macOS
        run: |
          cd build/macos/Build/Products/Release
          zip -r ${{ github.workspace }}/busic-macos.zip busic.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: busic-macos.zip

  # ─────────────────────────────── Android ─────────────────────────────
  build-android:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check.outputs.tag }}

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies & generate code
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks

      - name: Build APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk busic-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: busic-android.apk

  # ──────────────────────────────── iOS ────────────────────────────────
  build-ios:
    needs: check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check.outputs.tag }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies & generate code
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA (unsigned)
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r busic-ios-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: busic-ios-unsigned.ipa

  # ───────────────────────── Publish GitHub Release ────────────────────
  publish:
    needs: [check, build-linux, build-windows, build-macos, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          generate_release_notes: true
          files: |
            busic-linux-x64.tar.gz
            busic-windows-x64.zip
            busic-macos.zip
            busic-android.apk
            busic-ios-unsigned.ipa
